spring:
  application:
    name: backend-spring
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

# Two shard datasources — routed by ShardRoutingDataSource based on ShardContext
# HikariCP binding uses jdbc-url (not url)
app:
  datasource:
    shard1:
      jdbc-url: ${DB_SHARD1_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      pool-name: shard1-pool
      maximum-pool-size: 10
    shard2:
      jdbc-url: ${DB_SHARD2_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      pool-name: shard2-pool
      maximum-pool-size: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
