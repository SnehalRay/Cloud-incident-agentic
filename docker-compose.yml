services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL Shard 1 — receives items where name.hashCode() % 2 == 0
  # Hot partition fault targets this shard
  # ──────────────────────────────────────────────────────────
  postgres-shard-1:
    image: postgres:15-alpine
    container_name: incident-lab-postgres-shard-1
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-shard1-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - incident-lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # PostgreSQL Shard 2 — receives items where name.hashCode() % 2 == 1
  # ──────────────────────────────────────────────────────────
  postgres-shard-2:
    image: postgres:15-alpine
    container_name: incident-lab-postgres-shard-2
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres-shard2-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - incident-lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # Redis — cache layer + rate limiter shared state
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: incident-lab-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - incident-lab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ──────────────────────────────────────────────────────────
  # Backend — Spring Boot API
  # ──────────────────────────────────────────────────────────
  backend:
    build: ./services/backend-app/backend-spring
    container_name: incident-lab-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_SHARD1_URL: ${DB_SHARD1_URL}
      DB_SHARD2_URL: ${DB_SHARD2_URL}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
      REDIS_HOST:    ${REDIS_HOST}
      REDIS_PORT:    ${REDIS_PORT}
    networks:
      - incident-lab-network
    depends_on:
      postgres-shard-1:
        condition: service_healthy
      postgres-shard-2:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # Worker — Rust service that drains jobs:queue from Redis
  # and writes processed events to audit_log on shard-1
  # ──────────────────────────────────────────────────────────
  worker:
    build: ./services/worker
    container_name: incident-lab-worker
    restart: unless-stopped
    environment:
      REDIS_URL:    ${REDIS_URL}
      DATABASE_URL: ${WORKER_DATABASE_URL}
    networks:
      - incident-lab-network
    depends_on:
      postgres-shard-1:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # Log Pipeline — Rust service that reads backend logs and
  # exposes derived Prometheus metrics on :9091
  # ──────────────────────────────────────────────────────────
  log-pipeline:
    build: ./services/log-pipeline
    container_name: incident-lab-log-pipeline
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9091:9091"
    networks:
      - incident-lab-network
    depends_on:
      - backend

  # ──────────────────────────────────────────────────────────
  # Prometheus — scrapes log-pipeline metrics every 10s
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: incident-lab-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - incident-lab-network
    depends_on:
      - log-pipeline

  # ──────────────────────────────────────────────────────────
  # Grafana — dashboards over Prometheus, Prometheus auto-wired
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: incident-lab-grafana
    restart: unless-stopped
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - incident-lab-network
    depends_on:
      - prometheus

  # ──────────────────────────────────────────────────────────
  # Frontend — React app served via nginx
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend-app/template
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: incident-lab-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - incident-lab-network
    depends_on:
      - backend

# ──────────────────────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres-shard1-data:
  postgres-shard2-data:
  redis-data:
  prometheus-data:
  grafana-data:

# ──────────────────────────────────────────────────────────
# Network
# ──────────────────────────────────────────────────────────
networks:
  incident-lab-network:
    driver: bridge
